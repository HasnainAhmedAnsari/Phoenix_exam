version: "3.8"

services:

  api:
    build: .
    ports:
      - "8080:5000"
    depends_on:
      - mongo
    environment:
      MONGODB_URI: mongodb://mongo:27017/phoenix
    volumes:
      - ./phoenix-logs:/app/logs

  mongo:
    image: mongo:latest
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data: